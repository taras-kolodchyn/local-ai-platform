global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: litellm
    authorization:
      type: Bearer
      credentials_file: /run/secrets/litellm_master_key
    static_configs:
      - targets: ["litellm:4000"]

  - job_name: retrieval
    metrics_path: /metrics
    static_configs:
      - targets: ["retrieval:8000"]

  - job_name: mcp-tools
    metrics_path: /metrics
    static_configs:
      - targets: ["mcp-tools:8001"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]
