model_list:
  - model_name: local-qwen
    litellm_params:
      model: openai/ai/qwen3-coder:30B-A3B-UD-Q4_K_XL
      api_base: os.environ/INFERENCE_BASE_URL
      api_key: os.environ/INFERENCE_API_KEY
      use_chat_completions_api: true
      stream_timeout: 1800
      timeout: 1800
      input_cost_per_token: 0
      output_cost_per_token: 0
    model_info:
      mode: chat
      supports_function_calling: true
      supports_parallel_function_calling: false
      supports_reasoning: false

  - model_name: local-embeddings
    litellm_params:
      model: openai/ai/qwen3-embedding:0.6B-F16
      api_base: os.environ/INFERENCE_BASE_URL
      api_key: os.environ/INFERENCE_API_KEY
      input_cost_per_token: 0
    model_info:
      mode: embedding

litellm_settings:
  callbacks:
    - prometheus
  service_callback:
    - prometheus_system
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    password: os.environ/REDIS_PASSWORD
    namespace: os.environ/LITELLM_CACHE_NAMESPACE
    ttl: os.environ/LITELLM_CACHE_TTL
    mode: default_off
    supported_call_types:
      - completion
      - acompletion
  turn_off_message_logging: true
  redact_user_api_key_info: true
  set_verbose: false
  json_logs: true
  drop_params: true
  request_timeout: 1800

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  retry_after: 1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  disable_spend_logs: false
  require_key_mcp_access_defined: true
  health_check_interval: 60

mcp_servers:
  local_retrieval:
    url: http://retrieval:8000/mcp/
    transport: http
    description: Read-only local code and documentation retrieval
    allowed_tools:
      - search_code
      - get_chunk
  local_tools:
    url: http://mcp-tools:8001/mcp/
    transport: http
    description: Read-only local filesystem, Git, and PostgreSQL metadata tools
    allowed_tools:
      - list_files
      - read_text_file
      - git_status
      - git_log
      - postgres_select

  github:
    url: http://github-mcp:8082
    transport: http
    description: Opt-in read-only GitHub access; unavailable in the default offline profile
    extra_headers:
      - Authorization
    static_headers:
      X-MCP-Readonly: "true"
      X-MCP-Lockdown: "true"
      X-MCP-Tools: get_me,get_file_contents,list_branches,list_commits,get_commit,search_code,search_repositories,issue_read,pull_request_read
    allowed_tools:
      - get_me
      - get_file_contents
      - list_branches
      - list_commits
      - get_commit
      - search_code
      - search_repositories
      - issue_read
      - pull_request_read
    available_on_public_internet: false
